<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Würfelspiel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">

    <header>
      <a href="../" class="back-link">← zurück</a>
      <div class="eyebrow">Minispiel</div>
      <h1>Würfel<em>spiel</em></h1>
      <p class="subtitle">Zwei Spieler werfen — wer höher hat, gewinnt die Runde.</p>
    </header>

    <div class="arena">

      <!-- Spieler 1 -->
      <div class="player" id="player1">
        <div class="player-label">Spieler 1</div>
        <div class="dice" id="dice1">
          <div class="dice-face" id="face1">?</div>
        </div>
        <div class="player-score">
          Punkte: <span id="score1">0</span>
        </div>
      </div>

      <!-- Mitte -->
      <div class="center">
        <div class="vs">VS</div>
        <button class="roll-btn" id="rollBtn">Würfeln!</button>
        <div class="round-info">Runde <span id="round">1</span></div>
        <div class="result-msg" id="resultMsg"></div>
      </div>

      <!-- Spieler 2 -->
      <div class="player" id="player2">
        <div class="player-label">Spieler 2</div>
        <div class="dice" id="dice2">
          <div class="dice-face" id="face2">?</div>
        </div>
        <div class="player-score">
          Punkte: <span id="score2">0</span>
        </div>
      </div>

    </div>

    <button class="reset-btn" id="resetBtn">Spiel zurücksetzen</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
